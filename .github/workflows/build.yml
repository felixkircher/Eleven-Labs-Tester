name: Build Electron App

on:
  push:
    tags:
      - "v*"          # Läuft bei Tags wie v1.1.1, v2.0.0 etc.

permissions:
  contents: write     # Nötig um Draft-Release zu erstellen / bearbeiten

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: |
            # Neu in dieser Version
            -

            ---

            # Hinweis: Windows
            
            Da **Agent Tester** noch nicht codesigned ist, zeigt Windows möglicherweise Warnungen beim Starten der App an.

            **Wenn du die App öffnest, kann es zu einem Windows Defender SmartScreen-Warnhinweis kommen.**

            **Klicke auf "Weitere Informationen" → "Noch einmal ausführen", um die App zu starten.**

            ---
            
            # Hinweis: Linux

            **Um die App auf Linux zu starten muss FUSE installiert sein.**

            Falls nicht installiert:
            
            ```bash
            sudo pacman -S fuse2
            ```

            Danach einfach die .AppImage Datei ausführbar machen und starten:
            
            ```bash
            chmod +x AgentTester*.AppImage
            ./AgentTester*.AppImage
            ```

            ---

            **Thanks to RapidRAW for the instructions to run :)**
            
          files: |
            dist/*Setup*.exe
            dist/*arm64*.dmg
            dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
