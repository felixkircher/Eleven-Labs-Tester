name: Build Electron App

on:
  push:
    tags:
      - "v*"          # Läuft bei Tags wie v1.1.1, v2.0.0 etc.

permissions:
  contents: write     # Nötig um Draft-Release zu erstellen / bearbeiten

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dist/**/*.exe
            name: Windows
          - os: macos-latest
            artifact: dist/**/*.dmg
            name: macOS

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: Ohne Code-Signing baut electron-builder ein unsigned DMG.
      # Für ein signiertes Binary müsstest du APPLE_ID etc. als Secrets hinterlegen.
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Alle Binaries aus dist/ hochladen
      - name: Upload to Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: |
            # Neu in dieser Version
            -

            # Hinweis: macOS und Windows
            
            Da **Agent Tester** noch nicht codesigned ist, zeigt macOS und Windows möglicherweise Warnungen beim Starten der App an.

            ## macOS:

            Nach der Installation musst du die App in den Einstellungen des Systems öffnen und den Schutz vor unbekannten Entwicklern deaktivieren und die App dann "Dennoch öffnen".

            **Dazu gehe wie folgt vor:**
            1. Öffne die Systemeinstellungen und navigiere zu **"Datenschutz & Sicherheit".**
            2. Scrolle nach ganz unten bis du bei **"Sicherheit"** bist.
            3. Bei **"Apps erlauben von"** wähle **"App Store & Bekannte Entwicklungsteams".**
            4. Versuche die App zu öffnen und klicke bei dem PopUp **"Agent Tester.app" nicht geöffnet"** auf Fertig.
            5. Jetzt kannst du in den Systemeinstellungen unter dem geänderten Punkt die App **"Dennoch öffnen"** und nun nutzen ;)

            ## Windows:

            **Wenn du die App öffnest, kann es zu einem Windows Defender SmartScreen-Warnhinweis kommen.**

            **Klicke auf "Weitere Informationen" → "Noch einmal ausführen", um die App zu starten.**

            ### **Thanks to RapidRAW for the instructions to run :)**
            
          files: |
            dist/*Setup*.exe
            dist/*arm64*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}