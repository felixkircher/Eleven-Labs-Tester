name: Build Electron App

on:
  push:
    tags:
      - "v*"          # Läuft bei Tags wie v1.1.1, v2.0.0 etc.

permissions:
  contents: write     # Nötig um Draft-Release zu erstellen / bearbeiten

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: dist/**/*.exe
            name: Windows
          - os: macos-latest
            artifact: dist/**/*.dmg
            name: macOS

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # macOS: Ohne Code-Signing baut electron-builder ein unsigned DMG.
      # Für ein signiertes Binary müsstest du APPLE_ID etc. als Secrets hinterlegen.
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Wenn du vorher Auto-Discovery deaktiviert hast, ggf. entfernen:
          # CSC_IDENTITY_AUTO_DISCOVERY: false

      # Alle Binaries aus dist/ hochladen
      - name: Upload to Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: |
            # New in this Release
            -

            # Running on macOS and Windows
            Because **Agent Tester** is not yet code-signed, both macOS and Windows may show warnings when you try to run the app.

            ## On macOS:
            You'll need to remove the quarantine flag after installation:

            `` xattr -dr com.apple.quarantine '/Applications/Agent Tester.app' ``

            Without this step, macOS may report the app as "corrupted."

            ## On Windows:
            When launching the app, you may see a Windows Defender SmartScreen warning.

            Click "More info" → "Run anyway" to continue.

            ### Thanks to RapidRAW for the instructions to run :)
            
          files: |
            dist/*Setup*.exe
            dist/*arm64*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}